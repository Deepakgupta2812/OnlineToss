<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Online Coin Toss — Premium 3D Experience</title>
    <meta name="description" content="Flip a coin in style. A premium, cinematic coin toss experience with realistic 3D physics, immersive sound effects, and live statistics." />
